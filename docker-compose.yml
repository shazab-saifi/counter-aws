services:
  postgres:
    image: postgres
    environment:
      - POSTGRES_PASSWORD=mycounterapp
    ports:
      - '5432:5432'
    volumes:
      - counter-vol:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - '4000:4000'
    env_file:
      - ./apps/backend/.env
    depends_on:
      postgres:
        condition: service_healthy
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - '3000:3000'
volumes:
  counter-vol: